name: Release

# Builds the WPF GUI (.exe) and publishes a GitHub Release whenever the
# version inside win10-clean.bat changes (on push to master) or on manual run.
# To cut a new version: bump WIN10CLEAN_VERSION in win10-clean.bat, update
# CHANGELOG.md, push to master -> the Release is created automatically.
on:
  push:
    branches: [ master ]
    paths:
      - 'win10-clean.bat'
      - 'win10-clean-undo.bat'
      - 'CHANGELOG.md'
      - 'win10-clean-gui/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from script
        id: ver
        shell: bash
        run: |
          v=$(grep -oP 'WIN10CLEAN_VERSION=\K[0-9]+\.[0-9]+\.[0-9]+' win10-clean.bat | head -n1)
          if [ -z "$v" ]; then echo "Version not found in win10-clean.bat"; exit 1; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Detected version: $v"

      - name: Check if release already exists
        id: check
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.version }} already exists - skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build GUI (.exe)
        if: steps.check.outputs.exists == 'false'
        run: dotnet build win10-clean-gui/win10-clean-gui.csproj -c Release

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: win10-clean v${{ steps.ver.outputs.version }}
          files: |
            win10-clean.bat
            win10-clean-undo.bat
            win10-clean-gui/bin/Release/net48/win10-clean-gui.exe
          generate_release_notes: true
