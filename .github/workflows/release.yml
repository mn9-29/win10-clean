name: Release

# Builds the React UI + WPF/WebView2 GUI and publishes a GitHub Release
# whenever the version inside winforge.bat changes (push to master) or on
# manual run. The .exe now ships with WebView2/Newtonsoft DLLs, so the
# release artifact is a ZIP of the whole output folder.
on:
  push:
    branches: [ master ]
    paths:
      - 'winforge.bat'
      - 'winforge-undo.bat'
      - 'CHANGELOG.md'
      - 'WinForge/**'
      - 'web/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from script
        id: ver
        shell: bash
        run: |
          v=$(grep -oP 'WINFORGE_VERSION=\K[0-9]+\.[0-9]+\.[0-9]+' winforge.bat | head -n1)
          if [ -z "$v" ]; then echo "Version not found in winforge.bat"; exit 1; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Detected version: $v"

      - name: Check if release already exists
        id: check
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.version }} already exists - skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React UI
        if: steps.check.outputs.exists == 'false'
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Bundle UI into the app
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path WinForge/Assets | Out-Null
          if (Test-Path WinForge/Assets/app.zip) { Remove-Item WinForge/Assets/app.zip }
          Compress-Archive -Path web/dist/* -DestinationPath WinForge/Assets/app.zip -Force

      - name: Setup .NET
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build GUI (.exe)
        if: steps.check.outputs.exists == 'false'
        run: dotnet build WinForge/WinForge.csproj -c Release

      # Optional code-signing. Add repo secrets CERT_PFX_BASE64 (base64 of a
      # .pfx) and CERT_PASSWORD to enable it; otherwise this step is skipped.
      - name: Sign executable (optional)
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        env:
          CERT_PFX_BASE64: ${{ secrets.CERT_PFX_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:CERT_PFX_BASE64)) {
            Write-Host "No signing certificate configured - skipping signing."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:CERT_PFX_BASE64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue | Select-Object -Last 1
          if (-not $signtool) { Write-Error "signtool not found on runner."; exit 1 }
          & $signtool.FullName sign /fd SHA256 /f $pfx /p $env:CERT_PASSWORD `
            /tr http://timestamp.digicert.com /td SHA256 `
            "WinForge/bin/Release/net48/WinForge.exe"
          Write-Host "Executable signed."

      - name: Package release ZIP + checksum
        if: steps.check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $out = "WinForge/bin/Release/net48"
          $zip = "WinForge-v$ver.zip"
          Compress-Archive -Path "$out/*" -DestinationPath $zip -Force
          (Get-FileHash $zip -Algorithm SHA256).Hash | Out-File -Encoding ascii "$zip.sha256"
          Write-Host "Packaged $zip ($((Get-Item $zip).Length) bytes)"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: WinForge v${{ steps.ver.outputs.version }}
          files: |
            WinForge-v${{ steps.ver.outputs.version }}.zip
            WinForge-v${{ steps.ver.outputs.version }}.zip.sha256
            winforge.bat
            winforge-undo.bat
          generate_release_notes: true
