name: PR build check

# Compiles the React UI + WPF/WebView2 host on every pull request so build
# breaks are caught BEFORE merging to master (Release only runs after merge).
on:
  pull_request:
    branches: [ master ]
    paths:
      - 'WinForge/**'
      - 'web/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build React UI
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Bundle UI into the app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path WinForge/Assets | Out-Null
          if (Test-Path WinForge/Assets/app.zip) { Remove-Item WinForge/Assets/app.zip }
          Compress-Archive -Path web/dist/* -DestinationPath WinForge/Assets/app.zip -Force
          Write-Host "app.zip size: $((Get-Item WinForge/Assets/app.zip).Length) bytes"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build GUI (.exe)
        run: dotnet build WinForge/WinForge.csproj -c Release
